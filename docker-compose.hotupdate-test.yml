version: "3.9"

# 热更新模拟测试：使用 v1.12.0 镜像启动，验证 Watchtower 更新到 v1.12.1

services:
  app:
    image: guangshanshui/outlook-email-plus:latest
    container_name: outlook-hotupdate-test
    ports:
      - "5002:5000"
    environment:
      SECRET_KEY: "980bb366e44920382e395a3116de578b5faa5b246c4e257af5caad3888f25106"
      LOGIN_PASSWORD: "admin123"
      FLASK_ENV: "production"
      SCHEDULER_AUTOSTART: "true"
      DATABASE_PATH: "/app/data/outlook_accounts.db"
      WATCHTOWER_HTTP_API_TOKEN: "test-hotupdate-token-123"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request as u; u.urlopen('http://localhost:5000/healthz', timeout=4).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - test-net

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower-test
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_HTTP_API_TOKEN=test-hotupdate-token-123
      - WATCHTOWER_HTTP_API_UPDATE=true
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_HTTP_API_PERIODIC_POLLS=false
    command: --http-api-update --label-enable --debug
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    networks:
      - test-net

networks:
  test-net:
    driver: bridge
